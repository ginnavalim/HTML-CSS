<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e dimua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível"> <!--Bounce rates coisas como imagens que necessitam rolar, aumentar, diminuir a tela faz com que o usuário saia do site que acaba sendo indicado pelo google como um site ruim e não recomendando o site a outras pessoas-->
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudiso em HTML5</p>
    <!--<audio src="midia/13cocktails.mp3"controls autoplay></audio>-->
    <!--compatível com mp3 wav ogg-->
    <audio preload="metadata" autoplay controls loop> <!--none, metadata, auto; loop serve para recomeçar uma música, n recomendado-->
        <source src="midia/13cocktails.mp3" type="audio/mpeg">
        <source src="midia/13cocktails.ogg" type="audio/ogg">
        <source src="midia/13cocktails.wav" type="audio/wav"> <!--Evitar wav pois são arquivos muito pesados-->
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="midia/13cocktails.mp3">Clique aqui para baixar o arquivo MP3</a></p>
    </audio>
</body>
</html>
