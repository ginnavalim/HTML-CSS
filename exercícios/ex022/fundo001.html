<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Imagem de Fundo</title>
    <style>
        body {
            background-image: url('imagens/wallpaper001.jpg');
        }

        div.quadrado {
            display: inline-block;
            border: 2px solid black;
            border-radius: 10px;
            background-color: lightgray;
            width: 300px;
            height: 300px;
        }

        div#q1 {
            background-color: #96d5ee;
        }

        div#q2 {
            background-image: linear-gradient(to bottom, #c89db3, #c60267);
        }

        div#q3 {
            background-image: url('imagens/pattern003.png');
        } /*obs.: em relação as imagens a pattern001 é bem pequena, então para caber no espaço ela fica com o "corte" em formato de jogo da velha no navegador. E fotos grandes ficam cortadas para que caibam dentro do espaço.*/
    </style>
</head>
<body>
    <div class="quadrado" id="q1">

    </div>
    <div class="quadrado" id="q2">

    </div>
    <div class="quadrado" id="q3">

    </div>
</body>
</html>
