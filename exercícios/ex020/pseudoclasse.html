<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
        div {
            display: inline-block;
            background-color: lightgray;
            border: 1px solid black;
            text-align: center;
            height: 200px;
            width: 200px;
        } 
        div:hover {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <div id="d1">01</div> <!--: serve para o estado em que a classe está, ativo,marcado,vazio,habilitado,..--> <!--hover- para quando o mouse estiver em cima-->
    <div id="d2">02</div>
    <div id="d3">03</div> <!--Div's e o conhecimento mais aprofundado dos estados será visto no próximo capítulo, esta aula ta mais para um "conteúdos que serão vistos na próxima aula", será visto o uso do hover agora-->
</body>
</html>
